<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Control</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <!-- 🔥 FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<!-- ===== YOUR UI (UNCHANGED) ===== -->
<div class="app-shell container py-4">
    <div id="loginScreen" class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm login-card">
                <div class="card-body p-4">

                    <h2>Smart Home Login</h2>

                    <form id="loginForm">
                        <select id="userSelect" class="form-select mb-2"></select>

                        <input id="passwordInput" type="password" class="form-control mb-2" placeholder="Password">

                        <button type="submit" class="btn btn-primary w-100">Login</button>

                        <span id="loginError" class="text-danger"></span>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="d-none">

        <h3 id="dashboardTitle"></h3>

        <div id="roomsContainer"></div>

    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
